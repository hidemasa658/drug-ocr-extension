<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <title>ぞうさん薬局 薬名転写</title>
  <link rel="stylesheet" href="sidepanel.css">
</head>
<body>
  <header class="header">
    <img class="header__logo" src="logo_yoko.png" alt="ぞうさん薬局">
    <span id="storeLabel" class="header__store"></span>
    <button id="refreshBtn" class="icon-btn" title="更新">↻</button>
    <button id="settingsBtn" class="icon-btn" title="設定/ログ">⚙</button>
  </header>

  <!-- 初回起動時の店舗選択モーダル（強制） -->
  <div id="storePickerOverlay" class="store-picker-overlay hidden">
    <div class="store-picker-modal">
      <h2 class="store-picker-title">所属店舗を選択</h2>
      <p class="store-picker-sub">このPCで閲覧する店舗を選んでください。<br><strong>選択後は変更できません</strong></p>
      <div id="storePickerList" class="store-picker-list"></div>
    </div>
  </div>

  <nav class="tabs">
    <button type="button" class="tab" data-tab="ocr">薬名</button>
    <button type="button" class="tab active" data-tab="questionnaire">新患アンケート</button>
  </nav>

  <main>
    <div id="status" class="status hidden"></div>
    <div id="error" class="error hidden"></div>
    <div class="tab-panel" id="tab-ocr">
      <div id="history"></div>
    </div>
    <div class="tab-panel active" id="tab-questionnaire">
      <div id="questionnaireError" class="error hidden"></div>
      <div id="questionnaireList"></div>
    </div>
  </main>

  <aside id="settingsPanel" class="settings hidden">
    <div class="settings__header">
      <strong>設定・ログ</strong>
      <button id="settingsClose" class="icon-btn">×</button>
    </div>
    <div class="settings__body">
      <div class="token-section">
        <label for="apiTokenInput" style="font-size:12px;font-weight:bold;display:block;margin-bottom:4px;">APIトークン</label>
        <div style="display:flex;gap:4px;align-items:center;">
          <input type="password" id="apiTokenInput" placeholder="管理者から受け取ったtokenを貼り付け" style="flex:1;font-family:monospace;font-size:11px;padding:4px;border:1px solid #ccc;border-radius:3px;">
          <button id="apiTokenSave" class="icon-btn" style="font-size:11px;padding:4px 8px;">保存</button>
        </div>
        <div id="apiTokenStatus" style="font-size:10px;color:#666;margin-top:4px;">未設定（店舗Wi-Fi等のIP許可リスト外PCでは必須）</div>
      </div>

      <div class="token-section" style="margin-top:10px;">
        <label for="pcNameInput" style="font-size:12px;font-weight:bold;display:block;margin-bottom:4px;">このPCの名前 (転写ログ用)</label>
        <div style="display:flex;gap:4px;align-items:center;">
          <input type="text" id="pcNameInput" placeholder="例: 淵野辺投薬PC1" style="flex:1;font-size:11px;padding:4px;border:1px solid #ccc;border-radius:3px;">
          <button id="pcNameSave" class="icon-btn" style="font-size:11px;padding:4px 8px;">保存</button>
        </div>
        <div id="pcNameStatus" style="font-size:10px;color:#666;margin-top:4px;">転写ログにこの名前が記録されます</div>
      </div>

      <hr style="margin:10px 0;border:none;border-top:1px solid #eee;">

      <label class="switch-row">
        <input type="checkbox" id="debugToggle">
        <span>デバッグモード（console に詳細ログ）</span>
      </label>

      <div class="log-section">
        <div class="log-header">
          <span>ログ (<span id="logCount">0</span>)</span>
          <button id="logClear" class="icon-btn">クリア</button>
        </div>
        <ul id="logList" class="log-list"></ul>
      </div>
    </div>
  </aside>

  <div id="toast" class="toast"></div>

  <script src="sidepanel.js"></script>
</body>
</html>
